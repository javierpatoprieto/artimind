<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page not found · Artimind</title>
<meta name="description" content="The page you're looking for doesn't exist." />
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #EDE8DD;
    --ink: #1F1D1A;
    --warm: #807870;
    --neon: #C5FF3F;
    --serif: 'Instrument Serif', serif;
    --sans: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }
  ::selection { background: var(--neon); color: var(--ink); }

  .code {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 32px;
  }
  h1 {
    font-size: clamp(64px, 14vw, 200px);
    line-height: 0.86;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
  }
  h1 .b {
    font-family: var(--sans);
    font-weight: 700;
    text-transform: uppercase;
    color: var(--ink);
    letter-spacing: -0.025em;
  }
  h1 .it {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--warm);
    text-transform: none;
  }
  h1 .neon-mark {
    display: inline-block;
    background: var(--neon);
    color: var(--ink);
    padding: 0 0.16em 0.04em;
    line-height: 1;
  }
  p {
    font-family: var(--serif);
    font-size: clamp(20px, 2.4vw, 28px);
    line-height: 1.4;
    color: var(--ink);
    max-width: 32ch;
    margin-bottom: 48px;
  }
  p em { font-style: italic; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--ink);
    color: var(--paper);
    padding: 16px 28px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 100px;
    text-decoration: none;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .btn:hover { background: var(--neon); color: var(--ink); }
  .btn .circ {
    width: 18px;
    height: 18px;
    background: var(--neon);
    color: var(--ink);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .btn:hover .circ { background: var(--ink); color: var(--neon); }
</style>
</head>
<body>
  <div class="code">Error 404 · Page not found</div>
  <h1>
    <span class="it">This page</span><br/>
    <span class="b">doesn't</span><br/>
    <span class="b neon-mark">exist</span><span class="b">.</span>
  </h1>
  <p>
    Maybe it was a <em>draft we never published</em>. Maybe you mistyped. Either way, let's get you back on track.
  </p>
  <a href="/" class="btn">
    Take me home
    <span class="circ">→</span>
  </a>
</body>
</html>
